name: Deploy to Railway

# Auto-deploys the app to Railway on every push to main (and on manual run).
# GitHub's runners can reach Railway even though some sandboxes can't.
#
# Setup: add a repository SECRET `RAILWAY_TOKEN` (a Railway *project* token) under
# Settings → Secrets and variables → Actions. Set the app env vars (at minimum
# ANTHROPIC_API_KEY) on the Railway service. If RAILWAY_TOKEN isn't set, this
# workflow skips cleanly. The target service is set via RAILWAY_SERVICE below.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Exact Railway service name (discovered via `railway status`). Override with a
  # repo variable named RAILWAY_SERVICE if the service is ever renamed.
  RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE || '@arv-engine/server' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Check for Railway token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::RAILWAY_TOKEN secret not set — skipping deploy."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP != '1'

      - uses: actions/setup-node@v4
        if: env.SKIP != '1'
        with:
          node-version: 22

      - name: Install Railway CLI
        if: env.SKIP != '1'
        run: npm i -g @railway/cli

      - name: Deploy
        if: env.SKIP != '1'
        run: |
          echo "Deploying to service: $RAILWAY_SERVICE_NAME"
          railway up --service "$RAILWAY_SERVICE_NAME" --ci

name: Deploy to Railway

# Auto-deploys the app to Railway on every push to main (and on manual run).
# GitHub's runners can reach Railway even though some sandboxes can't.
#
# Setup: add a repository SECRET `RAILWAY_TOKEN` (a Railway *project* token) under
# Settings → Secrets and variables → Actions. Set the app env vars (at minimum
# ANTHROPIC_API_KEY) on the Railway service. If RAILWAY_TOKEN isn't set, this
# workflow skips cleanly.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Check for Railway token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::RAILWAY_TOKEN secret not set — skipping deploy."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP != '1'

      - uses: actions/setup-node@v4
        if: env.SKIP != '1'
        with:
          node-version: 22

      - name: Install Railway CLI
        if: env.SKIP != '1'
        run: npm i -g @railway/cli

      - name: Deploy
        if: env.SKIP != '1'
        # Service name is hardcoded (the GitHub repo variable RAILWAY_SERVICE was
        # set to the wrong value). Edit here if the Railway service is renamed.
        run: railway up --service '@arv-engine/server' --ci
